server {
    listen 80;
    server_name futpeladafc.com www.futpeladafc.com;
    
    # Redireciona todo o tráfego HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name futpeladafc.com www.futpeladafc.com;

    # Certificados SSL gerenciados pelo Certbot no host Linux
    ssl_certificate /etc/letsencrypt/live/futpeladafc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/futpeladafc.com/privkey.pem;

    # Configurações de segurança recomendadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Localização do root estático do React
    root /usr/share/nginx/html;
    index index.html;

    # Proxear as requisições /api para o backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxear as requisições /static (Fotos de Perfil) para o backend
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Redirecionar todas as outras rotas para o index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
