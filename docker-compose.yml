services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pelada-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - TZ=America/Sao_Paulo
      - PROJECT_NAME=Pelada FC Manager
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=sqlite:////app/data/pelada.db
      - BACKEND_CORS_ORIGINS=["http://localhost", "http://localhost:5173", "http://127.0.0.1:5173"]
    volumes:
      - ./backend/pelada.db:/app/data/pelada.db
      - ./backend/app/static/fotos:/app/static/fotos  # Persiste as fotos originais

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pelada-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    depends_on:
      - backend
